<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #0f111a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #10b981;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <img src="public/Logo.png" style="width: 80px; height: 80px; margin-bottom: 20px; object-fit: contain;" alt="Logo">
    <div class="spinner"></div>
    <p>Starting SSH Manager Service...</p>
</body>
</html>
